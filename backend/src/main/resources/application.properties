# Spring boot
spring.application.name=auth-app

# MySQL
# TODO: Move credentials to env variables for production
spring.datasource.url=jdbc:mysql://localhost:3306/auth_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JSON Web Token JWT
# TODO: Move secret to env variables for production
# JWT SECRET = "this is a very long secret key for jwt authentication application 2026"
jwt.secret=${JWT_SECRET:dGhpcyBpcyBhIHZlcnkgbG9uZyBzZWNyZXQga2V5IGZvciBqd3QgYXV0aGVudGljYXRpb24gYXBwbGljYXRpb24gMjAyNA==}
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000

# Server
server.port=8080

# Logging
logging.level.org.springframework.security=WARN